<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="data:image/svg+xml,
<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22>
<text y=%22.9em%22 font-size=%2290%22>🛒</text>
</svg>">
    <link rel="canonical" href="https://shoplive2026.vercel.app/" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ShopLive: Online Shopping Platform — Real-Time Orders, Deals & Smart Recommendations</title>
    <meta name="description" content="Shop smarter with ShopLive. Real-time order tracking, AI-powered product recommendations, exclusive daily deals, and secure checkout. Sign up free and start shopping today!" />
    <meta name="keywords" content="online shopping, real-time order tracking, smart recommendations, daily deals, secure checkout, ShopLive, ecommerce" />
    <meta name="author" content="ShopLive" />
    <meta name="robots" content="index, follow" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://shoplive2026.vercel.app/" />
    <meta property="og:title" content="ShopLive: Online Shopping Platform — Real-Time Orders & Smart Deals" />
    <meta property="og:description" content="Shop smarter with ShopLive. Real-time order tracking, AI-powered recommendations, exclusive daily deals, and secure checkout. Sign up free!" />
    <meta property="og:site_name" content="ShopLive" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://shoplive2026.vercel.app/" />
    <meta name="twitter:title" content="ShopLive: Online Shopping Platform — Real-Time Orders & Smart Deals" />
    <meta name="twitter:description" content="Shop smarter with ShopLive. Real-time order tracking, AI-powered recommendations, exclusive daily deals, and secure checkout." />

    <!-- Structured Data: WebSite (enables Google sitelinks search box) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "ShopLive",
      "url": "https://shoplive2026.vercel.app",
      "description": "Online shopping platform with real-time order tracking, AI-powered recommendations, and secure checkout.",
      "potentialAction": {
        "@type": "SearchAction",
        "target": "https://shoplive2026.vercel.app/shopping?q={search_term_string}",
        "query-input": "required name=search_term_string"
      }
    }
    </script>

    <!-- Structured Data: Organization -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "ShopLive",
      "url": "https://shoplive2026.vercel.app",
      "logo": "https://shoplive2026.vercel.app/logo.svg",
      "contactPoint": {
        "@type": "ContactPoint",
        "telephone": "+91-98765-43210",
        "contactType": "customer service",
        "email": "support@shoplive.com",
        "areaServed": "IN",
        "availableLanguage": "English"
      },
      "address": {
        "@type": "PostalAddress",
        "addressLocality": "Bangalore",
        "addressCountry": "IN"
      }
    }
    </script>

    <!-- Structured Data: SiteNavigationElement (helps Google understand site sections / sitelinks) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@graph": [
        {
          "@type": "SiteNavigationElement",
          "name": "Login",
          "description": "Sign in to your ShopLive account to track orders and access exclusive deals.",
          "url": "https://shoplive2026.vercel.app/login"
        },
        {
          "@type": "SiteNavigationElement",
          "name": "Register",
          "description": "Create a free ShopLive account. Get personalized recommendations and order tracking.",
          "url": "https://shoplive2026.vercel.app/register"
        },
        {
          "@type": "SiteNavigationElement",
          "name": "Shopping",
          "description": "Browse products with AI-powered recommendations and exclusive daily deals.",
          "url": "https://shoplive2026.vercel.app/shopping"
        },
        {
          "@type": "SiteNavigationElement",
          "name": "Dashboard",
          "description": "View your orders, track shipments in real-time, and manage your ShopLive account.",
          "url": "https://shoplive2026.vercel.app/dashboard"
        }
      ]
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
